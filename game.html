<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>叠叠乐 | Stack Game</title>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0d0d1a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Arial, sans-serif;
            overflow: hidden;
            user-select: none;
        }
        header { display: flex; align-items: center; gap: 14px; margin-bottom: 14px; }
        .back-btn {
            color: rgba(255,255,255,0.7);
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 13px;
            text-decoration: none;
            transition: background 0.2s, color 0.2s;
        }
        .back-btn:hover { background: rgba(255,255,255,0.18); color: white; }
        h1 { color: #FFD166; font-size: 20px; letter-spacing: 3px; font-weight: 700; }
        #gameCanvas {
            display: block;
            border-radius: 16px;
            box-shadow: 0 24px 80px rgba(0,0,0,0.7), 0 0 0 1px rgba(255,255,255,0.05);
            cursor: pointer;
            touch-action: none;
            max-width: calc(100vw - 20px);
            max-height: calc(100vh - 100px);
        }
        footer { margin-top: 12px; color: rgba(255,255,255,0.25); font-size: 12px; letter-spacing: 1px; }
    </style>
</head>
<body>
    <header>
        <a class="back-btn" href="index.html">← 返回主页</a>
        <h1>叠叠乐</h1>
    </header>
    <canvas id="gameCanvas"></canvas>
    <footer>点击 / 空格键 放置方块</footer>
    <script src="game.js"></script>
</body>
</html>
